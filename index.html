<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetMiserBot</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial;
    background: #0a0a0a;
    color: #fff;
}

.hero {
    text-align: center;
    padding: 60px 20px 20px;
}

.hero h1 {
    font-size: 32px;
    font-weight: 600;
}

.hero p {
    color: #aaa;
    margin-top: 10px;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.chat-box {
    height: 400px;
    overflow-y: auto;
    background: #111;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #222;
}

.msg {
    margin: 10px 0;
    padding: 10px 14px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #1f6feb;
    margin-left: auto;
}

.bot {
    background: #222;
    margin-right: auto;
}

input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #222;
    background: #111;
    color: white;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.form {
    margin-top: 40px;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #222;
}

.status {
    text-align: center;
    margin-top: 10px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Automate Your Business with AI</h1>
    <p>Capture leads. Close clients. Scale instantly.</p>
</div>

<div class="container">

<div class="chat-box" id="chat"></div>

<input id="message" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>

<div class="form">
<h3>Get Started</h3>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<button onclick="submitLead()">Request Demo</button>

<p class="status" id="status"></p>
</div>

</div>

<script>
const API_URL = "https://miserbot-v10-production.up.railway.app";
const chatBox = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    fetch(API_URL + "/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => addMessage(data.reply, "bot"))
    .catch(() => addMessage("Connection error", "bot"));
}

function submitLead() {
    const status = document.getElementById("status");

    const name = document.getElementById("name");
    const email = document.getElementById("email");
    const phone = document.getElementById("phone");

    const data = {
        name: name.value,
        email: email.value,
        phone: phone.value
    };

    if (!data.name || !data.email || !data.phone) {
        status.innerText = "Fill all fields";
        return;
    }

    status.innerText = "Sending...";

    fetch(API_URL + "/lead", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    })
    .then(() => {
        status.innerText = "Submitted ✔";
        name.value = "";
        email.value = "";
        phone.value = "";
    })
    .catch(() => status.innerText = "Error");
}
</script>

</body>
</html>
