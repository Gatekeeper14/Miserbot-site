<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GetMiserBot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0b;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
}

.chat-box {
    height: 400px;
    overflow-y: auto;
    border: 1px solid #222;
    padding: 10px;
    background: #111;
    margin-bottom: 10px;
}

.msg {
    margin: 8px 0;
}

.user {
    text-align: right;
    color: #4da6ff;
}

.bot {
    text-align: left;
    color: #ccc;
}

input, button, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border: none;
}

button {
    background: white;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.status {
    margin-top: 10px;
    color: #aaa;
}
</style>
</head>

<body>

<header>GetMiserBot</header>

<div class="container">

<div class="chat-box" id="chat"></div>

<input id="message" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>

<hr>

<h3>Quick Lead Form</h3>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<select id="service">
    <option>Business Automation</option>
    <option>Astrocartography</option>
    <option>Real Estate</option>
</select>

<button onclick="submitLead()">Submit</button>

<p class="status" id="status"></p>

</div>

<script>
const chatBox = document.getElementById("chat");

// ADD MESSAGE TO CHAT
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// 🔥 YOUR BACKEND URL
const API_URL = "https://miserbot-v10-production.up.railway.app";

// REAL AI CHAT
function sendMessage() {
    const input = document.getElementById("message");
    const text = input.value.trim();

    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    fetch(API_URL + "/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply || "No response.", "bot");
    })
    .catch(() => {
        addMessage("⚠️ Connection error.", "bot");
    });
}

// LEAD FORM (WORKING)
function submitLead() {
    const status = document.getElementById("status");

    const data = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        service: document.getElementById("service").value
    };

    if (!data.name || !data.email || !data.phone) {
        status.innerText = "⚠️ Please fill all fields.";
        return;
    }

    status.innerText = "Sending...";

    fetch(API_URL + "/lead", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(() => {
        status.innerText = "✅ Submitted successfully!";
    })
    .catch(() => {
        status.innerText = "❌ Error submitting.";
    });
}
</script>

</body>
</html>
