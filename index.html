<!DOCTYPE html>
<html>
<head>
<title>MiserBot 👑</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
background:#000;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
flex-direction:column;
}

input{
padding:12px;
margin:10px;
width:250px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<h1>MiserBot 👑</h1>
<p>Enter your info to get early access</p>

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<button onclick="join()">Join 👑</button>

<script>

async function join(){

const name = document.getElementById("name").value
const email = document.getElementById("email").value

await fetch("https://web-production-c03c9.up.railway.app/join",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
email:email
})
})

alert("You're on the waitlist!")

}

</script>

</body>
</html>
